spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reservations-tests}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:x1b4lb4_rta}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Keep DB usage low during full-suite runs against Supabase session mode.
      maximum-pool-size: 2
      minimum-idle: 0
      idle-timeout: 10000
      max-lifetime: 30000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
  
  flyway:
    enabled: true
    locations: classpath:testdb/migration

app:
  security:
    jwt-secret: test_jwt_secret_for_ci_and_local_tests_min_32_chars

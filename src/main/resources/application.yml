spring:
  application:
    name: reservas-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eap09_reservas}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  security:
    jwt-secret: ${JWT_SECRET:change_this_for_a_long_random_secret_at_least_32_bytes}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:1800}
    user-active-state-id: ${USER_ACTIVE_STATE_ID:1}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} traceId=%X{traceId} - %msg%n"

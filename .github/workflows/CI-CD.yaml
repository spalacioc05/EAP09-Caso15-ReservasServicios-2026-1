name: CI/CD - Build and Push to ACR

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #── SONARCLOUD (descomentar cuando se configure) ──────────────────
      # Requisitos previos:
      #   - Crear cuenta en sonarcloud.io con tu GitHub
      #   - Crear organización y proyecto en SonarCloud
      #   - Agregar secret SONAR_TOKEN en GitHub (Settings → Secrets → Actions)
      #   - Agregar en pom.xml:
      #       <sonar.projectKey>TU_PROJECT_KEY</sonar.projectKey>
      #       <sonar.organization>TU_ORGANIZATION</sonar.organization>
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          mvn verify sonar:sonar \
            -Dsonar.projectKey= EAP09-Caso15-ReservasServicios-2026-1
            -Dsonar.organization= ReservasServicios - Fabrica2026-1
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
      # ────────────────────────────────────────────────────────────────────

      - name: Set app name by branch
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "APP_NAME=reservas-backend-prod" >> $GITHUB_ENV
          else
            echo "APP_NAME=reservas-backend-dev" >> $GITHUB_ENV
          fi

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: reservasregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            reservasregistry.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }}
            reservasregistry.azurecr.io/${{ env.APP_NAME }}:latest
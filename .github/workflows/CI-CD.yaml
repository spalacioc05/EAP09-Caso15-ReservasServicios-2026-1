name: CI/CD - Build and Push to ACR

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: reservas_test
          POSTGRES_USER: reservas
          POSTGRES_PASSWORD: reservas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/reservas_test
          SPRING_DATASOURCE_USERNAME: reservas
          SPRING_DATASOURCE_PASSWORD: reservas
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=spalacioc05_EAP09-Caso15-ReservasServicios-2026-1 \
            -Dsonar.organization=spalacioc05 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Set app name by branch
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "APP_NAME=reservas-backend-prod" >> $GITHUB_ENV
          else
            echo "APP_NAME=reservas-backend-dev" >> $GITHUB_ENV
          fi

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: reservasregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            reservasregistry.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }}
            reservasregistry.azurecr.io/${{ env.APP_NAME }}:latest